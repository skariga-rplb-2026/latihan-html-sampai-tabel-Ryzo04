<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horizontal Menu</title>
    <style>
        body {
            margin: 0;
        }
        ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #333;
            position: fixed;
            top: 0;
            width: 100%;
        }
        li {
            float: left;
        }
        li a {
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        li a:hover:not(.active) {
            background-color: #111;
        }
        .active {
            background-color: #4CAF50;
        }
    </style>
</head>
<body>
    <ul>
        <li><a class="active" href="#home">Home</a></li>
        <li><a href="vertical_menu.html">vertical_menu</a></li>
        <li><a href="resposive_menu.html">resposive_menu</a></li>
        <li><a href="dorpdown_menu.html">dorpdown_menu</a></li>
    </ul>
    <div style="padding: 20px; margin-top: 30px; background-color: #1abc9c; height: 1500px;">
        <h1>Fixed Top Navigation Bar</h1>
        <h3>Scroll this page to see the effect</h3>
        <p>The navigation bar will stay at the top of the page while scrolling.</p>
        <p>Some text some text some text..</p>
    </div>
</body>
</html>
