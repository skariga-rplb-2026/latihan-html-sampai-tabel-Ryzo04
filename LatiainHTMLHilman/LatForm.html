<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan Form</title>
</head>

<body>
    <h3>Latihan Form</h3>

    <form action="#" method="POST">
        Pencarian : <input type="search" name="pencarian" style="font-size: 15px;" size="50"> <br>
        <br>
        Nama : <input type="text" name="first_name" size="50"> <br>
        <br>
        Umur : <input type="number" name="umur" size="30"> <br>
        <br>
        Warna : <input type="color" name="warna"> <br>
        <br>
        Tanggal : <input type="date" name="tanggal"> <br>
        <br>
        Lahir : <input type="month" name="lahir"> <br>
        <br>
        Minggu Ke- : <input type="week" name="minggu_ke"> <br>
        <br>
        No : <input type="tel" name="no_telp"> <br>
        <br>
        Email : <input type="email" name="email"> <br>
        <br>
        Password : <input type="password" name="password"> <br>
        <br>
        File : <input type="file" name="file"> <br>
        <br>
        Waktu : <input type="time" name="waktu"> <br>
        <br>
        Range : <input type="range" name="range" min="0" max="100"> <br>
        <br>
        Hidden : <input type="hidden" name="hidden" value="ini hidden"> <br>
        <br>
        <input type="button" name="submit">
    </form>
</body>

</html>
